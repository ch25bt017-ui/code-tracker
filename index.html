<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Code Tracker Pro</title>
    <style>
        /* CSS starts here */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
        }

        h1 { text-align: center; color: #333; margin-top: 10px; }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h3 { margin-top: 0; color: #555; font-size: 1.1rem; }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }

        input:focus { border-color: #007bff; }

        button {
            width: 100%;
            padding: 14px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.8; }

        button.secondary { background-color: #28a745; margin-top: 10px; }

        .result-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            min-height: 20px;
        }

        .status-bar {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }

        hr { border: 0; border-top: 1px solid #ddd; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>📦 Code Tracker</h1>

        <div class="card">
            <h3>Find Date by Code</h3>
            <input type="text" id="searchInput" placeholder="Enter Code (e.g. 101421/SAS)" oninput="searchCode()">
            <div id="resultDisplay" class="result-box">Type code to search...</div>
        </div>

        <div class="status-bar" id="status">Syncing with Google Sheets...</div>

        <hr>

        <div class="card">
            <h3>Add Local Entry</h3>
            <p style="font-size: 12px; color: #888;">Note: Local entries save to this phone only.</p>
            <input type="date" id="newDate">
            <input type="text" id="newCode" placeholder="Enter Code">
            <button class="secondary" onclick="addEntry()">Save Locally</button>
        </div>
    </div>

    <script>
        /* JS starts here */
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk2uT1Cb7IV1xoPg-GKFXCaosuu8G8dNmr5ruY-BBhoU6Q6o3p6O_KeEcVbDjyr4BPZ_YQnMYM6Ylw/pub?output=csv';

        // Load data from LocalStorage AND Google Sheets
        let database = JSON.parse(localStorage.getItem('codeLogs')) || [];

        async function loadSheetData() {
            const statusEl = document.getElementById('status');
            try {
                const response = await fetch(CSV_URL + "&cb=" + Date.now());
                const csvText = await response.text();
                const rows = csvText.split(/\r?\n/).filter(row => row.trim() !== "");
                
                const sheetEntries = rows.slice(1).map(row => {
                    const cols = row.split(',');
                    return { date: cols[0]?.trim(), code: cols[1]?.trim().toUpperCase() };
                }).filter(entry => entry.code);

                // Merge Google Sheet data with Local Storage data
                database = [...database, ...sheetEntries];
                
                statusEl.innerText = "● Cloud Synced (" + database.length + " Total Records)";
                statusEl.style.color = "green";
            } catch (e) {
                statusEl.innerText = "● Using Local Data Only (Offline)";
                statusEl.style.color = "orange";
            }
        }

        // Search Function
        function searchCode() {
            const query = document.getElementById('searchInput').value.trim().toUpperCase();
            const display = document.getElementById('resultDisplay');
            
            if (query.length < 2) {
                display.innerHTML = "Type more...";
                display.style.color = "#666";
                return;
            }

            // Look for the code
            const record = database.find(item => item.code.includes(query));

            if (record) {
                display.innerHTML = `✅ Found! Date: <span style="color:green; font-size:1.5rem; display:block;">${record.date}</span>`;
                display.style.color = "black";
            } else {
                display.innerHTML = `❌ Code not found`;
                display.style.color = "#d9534f";
            }
        }

        // Add Manual Entry (Saves to Browser Memory)
        function addEntry() {
            const dateInput = document.getElementById('newDate').value;
            const codeInput = document.getElementById('newCode').value.trim().toUpperCase();

            if (dateInput && codeInput) {
                const formattedDate = dateInput.split('-').reverse().slice(0,2).join('/');
                const newRecord = { date: formattedDate, code: codeInput };
                
                database.push(newRecord);
                
                // Save to local storage so it's not lost on refresh
                let localOnly = JSON.parse(localStorage.getItem('codeLogs')) || [];
                localOnly.push(newRecord);
                localStorage.setItem('codeLogs', JSON.stringify(localOnly));
                
                alert("Saved locally! Now searchable.");
                document.getElementById('newCode').value = "";
                searchCode(); // Refresh search if user just added it
            } else {
                alert("Please fill both date and code");
            }
        }

        // Initialize
        loadSheetData();
    </script>
</body>
</html>
